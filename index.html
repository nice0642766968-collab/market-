<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRU Digital Market | ระบบซื้อขายนักศึกษา</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authView" class="view">
        <div class="auth-card">
            <div class="auth-header">
                <h2>🌙 CRU Market</h2>
                <p id="authSubtitle">เข้าสู่ระบบเพื่อเริ่มใช้งาน</p>
            </div>
            <div class="auth-body">
                <input type="email" id="emailInp" placeholder="อีเมลนักศึกษา (@chandra.ac.th)">
                <input type="password" id="passInp" placeholder="รหัสผ่าน">
                <button onclick="handleAuth()" id="mainAuthBtn" class="btn-primary">ตกลง</button>
                <div class="auth-footer">
                    <span id="toggleText">ยังไม่มีบัญชี?</span> 
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggleBtn">สมัครสมาชิก</a>
                </div>
            </div>
        </div>
    </div>

    <div id="appView" class="view" style="display: none;">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">CRU <span>Market</span></div>
                <div class="nav-tools">
                    <button class="btn-accent" onclick="openModal('postModal')">+ ลงประกาศ/ตั้งตี้</button>
                    <button class="btn-text" onclick="logout()">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <div class="content-container">
            <aside class="sidebar">
                <h3>คณะ / หมวดหมู่</h3>
                <ul id="categoryList">
                    <li class="active" onclick="filterCat('ทั้งหมด')">ทั้งหมด</li>
                    <li onclick="filterCat('วิทยาศาสตร์')">วิทยาศาสตร์</li>
                    <li onclick="filterCat('วิทยาการจัดการ')">วิทยาการจัดการ</li>
                    <li onclick="filterCat('มนุษยศาสตร์')">มนุษยศาสตร์</li>
                    <li onclick="filterCat('ศึกษาศาสตร์')">ศึกษาศาสตร์</li>
                    <li onclick="filterCat('นิติศาสตร์')">นิติศาสตร์</li>
                </ul>
            </aside>

            <main class="main-feed">
                <div id="productGrid" class="grid">
                    </div>
            </main>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <h3>📢 สร้างประกาศใหม่</h3>
            <div class="input-group">
                <input type="text" id="pTitle" placeholder="ชื่อสินค้าหรือรายการหาร">
                <select id="pCat">
                    <option value="ทั่วไป">เลือกหมวดหมู่</option>
                    <option value="วิทยาศาสตร์">วิทยาศาสตร์</option>
                    <option value="วิทยาการจัดการ">วิทยาการจัดการ</option>
                    <option value="มนุษยศาสตร์">มนุษยศาสตร์</option>
                    <option value="ศึกษาศาสตร์">ศึกษาศาสตร์</option>
                </select>
            </div>
            <div class="split-calculator">
                <label>ระบบคำนวณราคาหาร (ถ้ามี)</label>
                <div class="row">
                    <input type="number" id="pTotal" placeholder="ราคารวม" oninput="doSplit()">
                    <input type="number" id="pPeople" placeholder="จำนวนคนหาร" value="1" oninput="doSplit()">
                </div>
                <p id="splitResult">ราคาต่อคน: ฿0.00</p>
            </div>
            <textarea id="pDesc" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
            <div class="modal-btns">
                <button onclick="closeModal('postModal')" class="btn-text">ยกเลิก</button>
                <button onclick="savePost()" class="btn-primary">ยืนยันโพสต์</button>
            </div>
        </div>
    </div>

    <div id="chatBox" class="chat-window" style="display: none;">
        <div class="chat-header">
            <span id="chatTargetName">แชท</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div id="chatMessages" class="chat-body"></div>
        <div class="chat-footer">
            <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendMsg()">ส่ง</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
